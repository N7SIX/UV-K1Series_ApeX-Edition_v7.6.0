

name: CI Docker Build & Static Analysis

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU (for ARM emulation, if needed)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build all firmware presets
        run: |
          chmod +x compile-with-docker.sh
          ./compile-with-docker.sh All

      - name: Install cppcheck
        run: sudo apt-get update && sudo apt-get install -y cppcheck

      - name: Run cppcheck static analysis
        run: |
          cppcheck --enable=all --inconclusive --error-exitcode=1 --force \
            --suppress=missingReturn \
            -i App/external \
            App/
